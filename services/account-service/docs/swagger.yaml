        $ref: '#/definitions/model.ProfileResponse'
      error:
        type: string
      message:
        type: string
      status_code:
        type: integer
    type: object
  model.PublicProfileResponse:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      status:
        type: string
      username:
        type: string
    type: object
  model.PublicProfileResponseDoc:
    properties:
      data:
        $ref: '#/definitions/model.PublicProfileResponse'
      error:
        type: string
      message:
        type: string
      status_code:
        type: integer
    type: object
  model.RefreshTokenRequest:
    properties:
      refresh_token:
        description: get from cookie
        type: string
    type: object
  model.UpdateAvatarRequest:
    properties:
      per_path:
        type: string
      tmp_path:
        type: string
    type: object
  model.UpdateAvatarResponse:
