basePath: /
definitions:
  model.AuthTokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  model.AuthTokenResponseDoc:
    properties:
      data:
        $ref: '#/definitions/model.AuthTokenResponse'
      error:
        type: string
      message:
        type: string
      status_code:
        type: integer
    type: object
  model.GoogleLoginRequest:
    properties:
      token:
        type: string
    type: object
  model.LogoutRequest:
    properties:
      refresh_token:
        description: get from cookie
        type: string
    type: object
  model.MessageResponseDoc:
    properties:
      data: {}
      error:
        type: string
      message:
        type: string
      status_code:
        type: integer
    type: object
  model.ProfileResponse:
