services:
  account-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: account_user
      POSTGRES_PASSWORD: account_pass
      POSTGRES_DB: account_db
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U account_user -d account_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability

  livestream-mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: strongpassword
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy

  kafka:
    image: apache/kafka:3.8.0
    restart: unless-stopped
    environment:
      # KRaft (no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Single node safe defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # Log dirs
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "19092:19092" # host access
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8010:8080"

  # 1. Core MinIO Server
  minio:
    image: quay.io/minio/minio
    ports:
      - "9000:9000" # Port for S3 API (Backend calls here)
      - "9001:9001" # Port for Web Console (Management UI)
    environment:
      MINIO_ROOT_USER: admin     # Access Key
      MINIO_ROOT_PASSWORD: password123 # Secret Key (Must be at least 8 characters)
      # TELL MINIO WHAT THE PUBLIC URL IS (Very important)
      # Assuming Nginx runs at port 8030 on localhost
      # MINIO_SERVER_URL: "http://localhost:8030" 
      # (Optional) Tell Console UI the URL to avoid login errors
      MINIO_BROWSER_REDIRECT_URL: "http://localhost:8031"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # 2. Setup Job (Auto-run once to configure the Bucket)
  minio-setup:
    image: quay.io/minio/mc
    depends_on:
      - minio
    entrypoint: |
      /bin/sh -c "
      echo 'Waiting for MinIO to start...';
      
      for i in $$(seq 1 30); do
        /usr/bin/mc alias set myminio http://minio:9000 admin password123 && break;
        echo 'MinIO not ready yet, waiting 2s...';
        sleep 2;
      done;
      
      /usr/bin/mc mb myminio/media --ignore-existing;
      
      # Set public read permission to allow image downloads
      /usr/bin/mc anonymous set download myminio/media;
      
      # tmp/ expires in 1 day
      /usr/bin/mc ilm add myminio/media --expiry-days 1 --prefix 'tmp/'
      
      echo 'Setup complete!';
      exit 0;
      "

  ## CDN simulator (local reverse proxy)
  cdn-nginx:
    image: nginx:alpine
    ports:
      - "8030:80" # Port for API (e.g.: http://localhost:8030/media/...)
      - "8031:666" # Port for UI (e.g.: http://localhost:8031)
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx # Persist cache outside to survive restarts
    depends_on:
      - minio

  ## API gateway
  kong:
    image: kong:3.6
    environment:
      # Disable Database mode
      KONG_DATABASE: "off"
      # Path to declarative config file inside container
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yaml
      # Configure logging for easier debugging via docker logs
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      # Enable Admin API for status checks (Listen on port 8001)
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
    volumes:
      # Mount config file from host to container
      # Create kong.yaml in the same directory before running
      - ./infra/kong/kong.yaml:/opt/kong/kong.yaml
    ports:
      # Port for client traffic (Proxy)
      - "8000:8000"
      - "8443:8443"
      # Admin API port (For checking only, do not expose to Internet)
      - "8001:8001"
      - "8444:8444"
    networks:
      - xoxz-network

  ## Monitoring
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.97.0  # use contrib for more exporters
    command: [ "--config=/etc/otelcol/config.yaml" ]
    volumes:
      - ./infra/otel-collector/otel-collector-config.yaml:/etc/otelcol/config.yaml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      # ADD THESE 3 LINES TO BREAK THROUGH (Get Host metrics):
      - /proc:/hostfs/proc:ro
      - /sys:/hostfs/sys:ro
      - /:/hostfs:ro
    ports:
      - "4317:4317"   # OTLP gRPC — your services connect here
      - "4318:4318"   # OTLP HTTP
    networks:
      - observability
    restart: unless-stopped

#  alloy:
#    image: grafana/alloy:v1.16.1
#    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
#    volumes:
#      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy
#    ports:
#      - "4317:4317"   # OTLP gRPC — same port, your services don't change
#      - "4318:4318"   # OTLP HTTP
#      - "12345:12345" # Alloy UI — useful for debugging pipelines
#    networks:
#      - observability
#    restart: unless-stopped

  # metrics
  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --web.enable-remote-write-receiver
      # ❌ removed otlp-write-receiver — collector handles this
    volumes:
      - ./infra/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml
    ports:
      - "9090:9090"
    networks:
      - observability
    restart: unless-stopped

  # traces
  tempo:
    image: grafana/tempo:2.4.1
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"   # Tempo query frontend — Grafana talks here
      - "4317"
    networks:
      - observability
    restart: unless-stopped

  # logs
  loki:
    image: grafana/loki:2.9.5
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3333:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning  # auto-add datasources
    networks:
      - observability
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

  # livestream
#  media-server:
#    image: bluenviron/mediamtx:1
#    ports:
#      - "1935:1935" # Port for receiving RTMP stream from OBS
#      - "8554:8554" # RTSP port (if needed)
#      - "8888:8888" # HLS port (for viewers to watch video stream)
#      - "8889:8889" # WebRTC port (for low-latency viewing)
#    environment:
#      - MTX_PROTOCOLS=tcp
#      # Webhook config: When someone pushes a stream, MediaMTX calls the Golang Service
#      # host.docker.internal allows container to reach the host machine (where Golang API runs)
#      - MTX_EXTERNALAUTHENTICATIONURL=http://host.docker.internal:8280/api/v1/public/webhook/auth
#    restart: always

  livekit:
    image: livekit/livekit-server:latest
    # Force it to detect host IP for WebRTC handshake (Local trick)
    command: --config /etc/livekit.yaml --node-ip=127.0.0.1
    ports:
      - "7880:7880"         # HTTP API and Websocket port (Control Plane)
      - "7881:7881"         # TCP port for WebRTC fallback
      - "7882:7882/udp"     # Main UDP port for Video/Audio data
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml
    depends_on:
      - redis
    restart: unless-stopped

  ingress:
    image: livekit/ingress:latest
    command: --config /etc/ingress.yaml
    ports:
      - "1935:1935"         # External port for receiving OBS stream
      - "8080:8080"         # WHIP
    volumes:
      - ./infra/livekit/ingress.yaml:/etc/ingress.yaml
    depends_on:
      - livekit
      - redis
    restart: unless-stopped

#  egress:
#    image: livekit/egress:latest
#    command: --config /etc/egress.yaml
#    restart: unless-stopped
#    environment:
#      - EGRESS_CONFIG_FILE=/etc/egress.yaml
#    volumes:
#      - ./infra/livekit/egress.yaml:/etc/egress.yaml
#      # Mount a local directory to test saving mp4 files before uploading to real S3
#      - ./records:/out

networks:
  xoxz-network:
    driver: bridge
  observability:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  redisinsight_data:
  kafka_data:
  minio_data:
  nginx_cache:
  mongo_data: